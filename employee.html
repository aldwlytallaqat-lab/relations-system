<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الموظف</title>
</head>
<body>

<h1>👤 لوحة الموظف</h1>

<button onclick="logout()">تسجيل خروج</button>

<script>
if(localStorage.getItem("role") !== "employee"){
  window.location = "index.html";
}

function logout(){
  localStorage.clear();
  window.location = "index.html";
}
</script>

</body>
</html>
